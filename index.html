<script>
function checkPass(){

// ─── FLOWING FIBER OPTICS ──────────────────────────────────────
// Inspired by Cisco Behance neon fiber visualization
// Key: Bézier curves that span the entire screen, rendered with glow layers
(function(){
var c=document.getElementById('neural-bg'),ctx=c.getContext('2d');
var W,H,dpr;
var mob=window.innerWidth<768;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

// A flowing fiber is a continuous cubic Bézier spline that drifts over time
// Each fiber has N control points that slowly oscillate, creating organic movement
var FIBER_COUNT=mob?8:16;
var CTRL_PTS=mob?5:7;
var STEPS_PER_SEG=40;

function Fiber(idx){
  var roll=Math.random();
  if(roll<0.38) this.col=[0,229,255];       // cyan
  else if(roll<0.68) this.col=[255,45,155]; // pink
  else this.col=[255,184,0];                // gold
  this.op=0.35+Math.random()*0.45;
  this.w=mob?0.4+Math.random()*0.6:0.6+Math.random()*1.1;
  this.idx=idx;
  this.setup();
}

Fiber.prototype.setup=function(){
  // Control points spread across the screen
  this.pts=[];
  for(var i=0;i<CTRL_PTS;i++){
    var baseX=W*(i/(CTRL_PTS-1))*1.3-W*0.15; // spread from -15% to 115%
    var baseY=H*(0.1+Math.random()*0.8);
    this.pts.push({
      bx:baseX, by:baseY,
      // Oscillation amplitudes
      ax:W*0.03+Math.random()*W*0.06,
      ay:H*0.04+Math.random()*H*0.08,
      // Oscillation speeds (very slow for smooth flow)
      fx:0.15+Math.random()*0.25,
      fy:0.12+Math.random()*0.2,
      // Phase offsets
      px:Math.random()*6.283,
      py:Math.random()*6.283
    });
  }
  this.phase=Math.random()*100;
  this.speed=0.15+Math.random()*0.15;
};

// Get current position of control point i at time t
Fiber.prototype.ctrlAt=function(i,t){
  var p=this.pts[i];
  return [
    p.bx+Math.sin(t*p.fx+p.px)*p.ax,
    p.by+Math.sin(t*p.fy+p.py)*p.ay
  ];
};

// Build the full curve as a series of points using Catmull-Rom → Bézier
Fiber.prototype.buildCurve=function(t){
  var ctrls=[];
  for(var i=0;i<CTRL_PTS;i++) ctrls.push(this.ctrlAt(i,t));
  
  // Generate smooth path through all control points using Catmull-Rom interpolation
  var curve=[];
  for(var i=0;i<ctrls.length-1;i++){
    var p0=ctrls[Math.max(0,i-1)];
    var p1=ctrls[i];
    var p2=ctrls[Math.min(ctrls.length-1,i+1)];
    var p3=ctrls[Math.min(ctrls.length-1,i+2)];
    for(var s=0;s<STEPS_PER_SEG;s++){
      var tt=s/STEPS_PER_SEG;
      var tt2=tt*tt, tt3=tt2*tt;
      // Catmull-Rom spline
      var x=0.5*((2*p1[0])+(p2[0]-p0[0])*tt+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*tt2+(3*p1[0]-p0[0]-3*p2[0]+p3[0])*tt3);
      var y=0.5*((2*p1[1])+(p2[1]-p0[1])*tt+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*tt2+(3*p1[1]-p0[1]-3*p2[1]+p3[1])*tt3);
      curve.push([x,y]);
    }
  }
  curve.push(ctrls[ctrls.length-1]);
  return curve;
};

Fiber.prototype.draw=function(time){
  var t=this.phase+time*this.speed;
  var curve=this.buildCurve(t);
  var len=curve.length;
  if(len<4)return;

  var R=this.col[0],G=this.col[1],B=this.col[2];
  var bo=this.op, w=this.w;

  ctx.lineCap='round';
  ctx.lineJoin='round';

  // Animated head position sweeps along the curve
  // Creates the "flowing stream" effect — bright head, fading tail
  var headProgress=(Math.sin(t*0.4)*0.5+0.5); // oscillates 0→1
  var headIdx=Math.floor(headProgress*(len-1));
  
  // Draw the full curve with distance-from-head based opacity
  var segs=32;
  var segLen=Math.max(4,Math.floor(len/segs));

  // Layer 1: Wide outer glow
  ctx.lineWidth=w*28;
  for(var s=0;s<segs;s++){
    var si=s*segLen, ei=Math.min(si+segLen+1,len-1);
    if(si>=len-1) break;
    var midIdx=(si+ei)/2;
    var distFromHead=Math.abs(midIdx-headIdx)/len;
    var a=0.04*bo*Math.exp(-distFromHead*4);
    if(a<0.001)continue;
    ctx.beginPath();
    ctx.strokeStyle='rgba('+R+','+G+','+B+','+a.toFixed(4)+')';
    ctx.moveTo(curve[si][0],curve[si][1]);
    for(var i=si+1;i<=ei;i++) ctx.lineTo(curve[i][0],curve[i][1]);
    ctx.stroke();
  }

  // Layer 2: Mid glow
  ctx.lineWidth=w*9;
  for(var s=0;s<segs;s++){
    var si=s*segLen, ei=Math.min(si+segLen+1,len-1);
    if(si>=len-1) break;
    var midIdx=(si+ei)/2;
    var distFromHead=Math.abs(midIdx-headIdx)/len;
    var a=0.18*bo*Math.exp(-distFromHead*3.5);
    if(a<0.002)continue;
    ctx.beginPath();
    ctx.strokeStyle='rgba('+R+','+G+','+B+','+a.toFixed(4)+')';
    ctx.moveTo(curve[si][0],curve[si][1]);
    for(var i=si+1;i<=ei;i++) ctx.lineTo(curve[i][0],curve[i][1]);
    ctx.stroke();
  }

  // Layer 3: Bright core
  ctx.lineWidth=w*2.5;
  for(var s=0;s<segs;s++){
    var si=s*segLen, ei=Math.min(si+segLen+1,len-1);
    if(si>=len-1) break;
    var midIdx=(si+ei)/2;
    var distFromHead=Math.abs(midIdx-headIdx)/len;
    var a=0.7*bo*Math.exp(-distFromHead*3);
    if(a<0.005)continue;
    ctx.beginPath();
    ctx.strokeStyle='rgba('+R+','+G+','+B+','+a.toFixed(4)+')';
    ctx.moveTo(curve[si][0],curve[si][1]);
    for(var i=si+1;i<=ei;i++) ctx.lineTo(curve[i][0],curve[i][1]);
    ctx.stroke();
  }

  // White-hot core near head
  var hotRadius=Math.floor(len*0.08);
  var hStart=Math.max(0,headIdx-hotRadius);
  var hEnd=Math.min(len-1,headIdx+hotRadius);
  if(hEnd-hStart>2){
    ctx.lineWidth=w*1;
    ctx.beginPath();
    ctx.strokeStyle='rgba(255,255,255,'+(0.3*bo).toFixed(3)+')';
    ctx.moveTo(curve[hStart][0],curve[hStart][1]);
    for(var i=hStart+1;i<=hEnd;i++) ctx.lineTo(curve[i][0],curve[i][1]);
    ctx.stroke();
  }

  // Head glow
  var hd=curve[headIdx];
  ctx.beginPath();ctx.arc(hd[0],hd[1],w*3,0,6.283);
  ctx.fillStyle='rgba('+R+','+G+','+B+','+(0.95*bo)+')';ctx.fill();
  ctx.beginPath();ctx.arc(hd[0],hd[1],w*10,0,6.283);
  ctx.fillStyle='rgba('+R+','+G+','+B+','+(0.12*bo)+')';ctx.fill();
  ctx.beginPath();ctx.arc(hd[0],hd[1],w*22,0,6.283);
  ctx.fillStyle='rgba('+R+','+G+','+B+','+(0.025*bo)+')';ctx.fill();
};

var fibers=[];
function init(){
  resize();
  fibers=[];
  for(var i=0;i<FIBER_COUNT;i++) fibers.push(new Fiber(i));
}

var startTime=0;
function loop(ts){
  if(!startTime) startTime=ts;
  var elapsed=(ts-startTime)/1000;

  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#0A0A1A';
  ctx.fillRect(0,0,W,H);

  ctx.globalCompositeOperation='lighter';
  for(var i=0;i<fibers.length;i++) fibers[i].draw(elapsed);

  requestAnimationFrame(loop);
}

window.addEventListener('resize',function(){resize();mob=window.innerWidth<768});
init();
requestAnimationFrame(loop);
})();
</script>
