<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0a0a;
  --fg:#e8e8e8;
  --accent:#00ffaa;
  --dim:rgba(232,232,232,0.4);
  --ghost:rgba(232,232,232,0.15);
  --border:rgba(232,232,232,0.08);
  --glass-bg:rgba(232,232,232,0.03);
  --glass-border:rgba(232,232,232,0.06);
  --error:#ff3366;
  --mono:'JetBrains Mono',monospace;
}

html,body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--fg);
  font-family:var(--mono);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* Neural Mesh Canvas */
canvas#neural-mesh{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
}

/* Scanline overlay */
.scanline{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}
.scanline::after{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,rgba(0,255,170,0.06),transparent);
  animation:scanmove 8s linear infinite;
}
@keyframes scanmove{
  0%{top:-3px}100%{top:100%}
}

/* Vignette */
.vignette{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;
  pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 0%,rgba(10,10,10,0.4) 60%,rgba(10,10,10,0.85) 100%);
}

/* Page layout */
.page{
  position:relative;z-index:3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;height:100dvh;
  padding:40px 24px;
}

/* Status line */
.status{
  display:flex;align-items:center;gap:10px;
  margin-bottom:40px;
  font-size:10px;text-transform:uppercase;letter-spacing:0.3em;
  color:var(--dim);
  opacity:0;animation:fadeIn 1s 0.3s forwards;
}
.status-dot{
  width:6px;height:6px;background:var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Title */
.title{
  font-size:clamp(28px,6vw,72px);
  font-weight:700;letter-spacing:0.05em;
  text-align:center;margin-bottom:20px;
  color:var(--fg);
  opacity:0;animation:slideUp 1.2s 0.6s forwards;
}

/* Claim */
.claim{
  font-size:clamp(11px,1.2vw,13px);
  font-weight:300;letter-spacing:0.04em;
  line-height:1.8;text-align:center;
  color:var(--dim);
  max-width:480px;
  margin-bottom:48px;
  opacity:0;animation:fadeIn 1s 1s forwards;
}

/* Glass Panel */
.glass-panel{
  width:100%;max-width:380px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:32px;
  opacity:0;animation:scaleIn 0.8s 1.4s forwards;
}

.panel-label{
  font-size:10px;text-transform:uppercase;
  letter-spacing:0.25em;color:var(--ghost);
  margin-bottom:28px;
}

.field{margin-bottom:24px}
.field-label{
  display:block;font-size:10px;text-transform:uppercase;
  letter-spacing:0.2em;color:var(--dim);margin-bottom:8px;
}
.field-input{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:14px;
  color:var(--fg);padding:8px 0;
  outline:none;transition:border-color 0.3s;
}
.field-input::placeholder{color:var(--ghost)}
.field-input:focus{border-color:var(--accent)}
.field-input.error{border-color:var(--error);animation:shake 0.5s ease}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-6px)}
  30%{transform:translateX(5px)}
  45%{transform:translateX(-4px)}
  60%{transform:translateX(3px)}
  75%{transform:translateX(-2px)}
}

.submit-btn{
  width:100%;margin-top:8px;
  background:var(--fg);color:var(--bg);
  border:none;font-family:var(--mono);
  font-size:11px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.25em;
  padding:14px;cursor:pointer;
  transition:all 0.2s;
  position:relative;overflow:hidden;
}
.submit-btn:hover{
  background:var(--accent);color:var(--bg);
}
.submit-btn:active{transform:scale(0.98)}

/* Glitch hover effect */
.submit-btn::before{
  content:attr(data-text);
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;text-align:center;
  opacity:0;
  color:var(--bg);
}
.submit-btn:hover::before{
  animation:glitch 0.3s ease;
}
@keyframes glitch{
  0%{opacity:1;transform:translate(-50%,-50%)}
  20%{opacity:0.8;transform:translate(calc(-50% + 2px),calc(-50% - 1px))}
  40%{opacity:0.6;transform:translate(calc(-50% - 2px),calc(-50% + 1px))}
  60%{opacity:0.8;transform:translate(calc(-50% + 1px),calc(-50% - 1px))}
  80%{opacity:1;transform:translate(-50%,-50%)}
}

/* Status messages */
.msg{
  height:20px;display:flex;align-items:center;justify-content:center;
  gap:6px;margin-top:16px;font-size:11px;letter-spacing:0.1em;
}
.msg-error{color:var(--error);display:none}
.msg-success{color:var(--accent);display:none;align-items:center;gap:8px}

/* Footer */
.footer{
  position:fixed;bottom:0;left:0;right:0;z-index:3;
  text-align:center;padding:20px 24px;
  font-size:9px;text-transform:uppercase;letter-spacing:0.2em;
  color:var(--ghost);line-height:2;
  opacity:0;animation:fadeIn 1s 2s forwards;
}
.footer a{color:var(--ghost);text-decoration:none;transition:color 0.25s}
.footer a:hover{color:var(--dim)}

/* Animations */
@keyframes fadeIn{to{opacity:1}}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{to{opacity:1;transform:scale(1)}}
.title{transform:translateY(20px)}
.glass-panel{transform:scale(0.95)}

/* Mobile */
@media(max-height:650px){

}
@media(max-width:480px){

<script>

// ── NEURAL MESH ──────────────────────────────────────────
// Interactive particle network — responds to mouse movement
(function(){
var c=document.getElementById('neural-mesh'),ctx=c.getContext('2d');
var W,H,dpr;
var mouse={x:-1000,y:-1000};
var mob=window.innerWidth<768;

var NODE_COUNT=mob?40:80;
var CONNECT_DIST=mob?120:160;
var MOUSE_RADIUS=mob?150:250;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function Node(){
  this.x=Math.random()*W;
  this.y=Math.random()*H;
  this.vx=(Math.random()-0.5)*0.3;
  this.vy=(Math.random()-0.5)*0.3;
  this.r=1+Math.random()*1.5;
  this.baseAlpha=0.15+Math.random()*0.25;
}

Node.prototype.update=function(){
  // Drift
  this.x+=this.vx;
  this.y+=this.vy;
  // Wrap
  if(this.x<-20)this.x=W+20;
  if(this.x>W+20)this.x=-20;
  if(this.y<-20)this.y=H+20;
  if(this.y>H+20)this.y=-20;

  // Mouse repulsion (subtle push)
  var dx=this.x-mouse.x,dy=this.y-mouse.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<MOUSE_RADIUS && dist>1){
    var force=((MOUSE_RADIUS-dist)/MOUSE_RADIUS)*0.8;
    this.vx+=dx/dist*force*0.15;
    this.vy+=dy/dist*force*0.15;
  }
  // Damping
  this.vx*=0.99;
  this.vy*=0.99;
};

Node.prototype.draw=function(){
  var dx=this.x-mouse.x,dy=this.y-mouse.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  var glow=(dist<MOUSE_RADIUS)?((MOUSE_RADIUS-dist)/MOUSE_RADIUS)*0.6:0;
  var alpha=this.baseAlpha+glow;

  ctx.beginPath();
  ctx.arc(this.x,this.y,this.r,0,6.283);
  ctx.fillStyle='rgba(0,255,170,'+alpha.toFixed(3)+')';
  ctx.fill();

  if(glow>0.1){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r*4,0,6.283);
    ctx.fillStyle='rgba(0,255,170,'+(glow*0.1).toFixed(4)+')';
    ctx.fill();
  }
};

var nodes=[];
function init(){
  resize();
  nodes=[];
  for(var i=0;i<NODE_COUNT;i++) nodes.push(new Node());
}

function drawConnections(){
  for(var i=0;i<nodes.length;i++){
    for(var j=i+1;j<nodes.length;j++){
      var dx=nodes[i].x-nodes[j].x;
      var dy=nodes[i].y-nodes[j].y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<CONNECT_DIST){
        var alpha=((CONNECT_DIST-dist)/CONNECT_DIST)*0.12;

        // Brighter connections near mouse
        var mx=(nodes[i].x+nodes[j].x)/2;
        var my=(nodes[i].y+nodes[j].y)/2;
        var mdx=mx-mouse.x,mdy=my-mouse.y;
        var mdist=Math.sqrt(mdx*mdx+mdy*mdy);
        if(mdist<MOUSE_RADIUS){
          alpha+=((MOUSE_RADIUS-mdist)/MOUSE_RADIUS)*0.15;
        }

        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle='rgba(0,255,170,'+alpha.toFixed(4)+')';
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
  }
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawConnections();
  for(var i=0;i<nodes.length;i++){
    nodes[i].update();
    nodes[i].draw();
  }
  requestAnimationFrame(loop);
}

document.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY});
document.addEventListener('touchmove',function(e){
  if(e.touches.length){mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}
},{passive:true});
document.addEventListener('mouseleave',function(){mouse.x=-1000;mouse.y=-1000});

window.addEventListener('resize',function(){resize();mob=window.innerWidth<768});
init();
requestAnimationFrame(loop);
})();
</script>
